  <!-- Gallery specific styles -->
  <style>
    .dw {
      box-sizing: border-box;
      column-gap: 0;
      position: relative;
    }
    .dw * { box-sizing: border-box; }
    .dw-panel {
      margin: 0;
      padding: 5px;
    }
    .dw-panel--pulse {
      transform-style: preserve-3d;
      perspective: 1000;
      transition: transform 0.25s ease 0s;
    }
    .dw-panel--pulse:hover {
      transform: scale(1.02);
    }
    .dw-panel__content {
      border-radius: 10px;
      overflow: hidden;
      padding: 20px;
      width: 100%;
    }
    @media (min-width: 768px) {
      .dw-panel {
        break-inside: avoid;
      }
    }
    .dw-cluster {
      display: flex;
      padding: 0;
    }
    @media (max-width: 430px) {
      .dw-cluster--vertical {
        flex-direction: column;
      }
    }
    .dw-cluster__segment {
      display: flex;
      flex: 1 1 auto;
    }
    .dw-cluster__segment--col {
      flex-direction: column;
    }
    @media (min-width: 430px) {
      .dw-cluster__segment--half {
        flex-basis: 50%;
      }
    }
    img.dw-panel__content {
      padding: 0;
      max-height: 320px;
      object-fit: cover;
    }
    .dw-lg {

  </style>
